name: Auto Reindex (24/7)

on:
  schedule:
    # Run every 6 hours at 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  reindex:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reindex
        run: |
          echo "Triggering Playbeat Digital auto-reindex at $(date -u)"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/cron/reindex?key=${{ secrets.CRON_SECRET }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Reindex failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Reindex completed successfully"
